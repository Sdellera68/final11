name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: ☕ Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: 📦 Install dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile
    
    - name: 🔧 Setup Gradle
      run: |
        cd frontend/android
        chmod +x gradlew
    
    - name: 🏗️ Clean build
      run: |
        cd frontend/android
        ./gradlew clean
    
    - name: 🔨 Build Debug APK
      run: |
        cd frontend/android
        ./gradlew assembleDebug --no-daemon --stacktrace
    
    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: aria-debug-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: ✅ Success
      if: success()
      run: |
        cd frontend/android/app/build/outputs/apk/debug
        ls -lh app-debug.apk
        echo "✅ Build réussi !"
        echo "📱 Téléchargez depuis Actions > Artifacts"
